name: Build and Deploy Quiz Service

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_API_VERSION: "1.41"

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Project JAR with Maven
      run: ./mvnw clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/quiz-service:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
    - name: SSH and Run Application Container
      run: |
        ssh -o StrictHostKeyChecking=no ${{ vars.VM_USER }}@${{ vars.VM_HOST }} << 'EOF'
          # Login to Docker Hub inside the VM
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Tear down any running instance smoothly
          docker stop quiz-container || true
          docker rm quiz-container || true

          # Force the VM to fetch the newest image from Docker Hub
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/quiz-service:latest
          
          # Spin up the fresh container on Host Port 8081 mapping cleanly to internal 8080
          docker run -d --name quiz-container --add-host eureka-server-01:192.168.237.130 -p 8081:8080 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/quiz-service:latest
        EOF
