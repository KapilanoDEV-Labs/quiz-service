# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

# Enable H2 Web Console and allow connections from your iMac
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.application.name=quiz-service

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://eureka-server-01:8761/eureka/
eureka.instance.prefer-ip-address=true
# Dynamically pull the host IP address or manually match it to the destination VM if preferred
eureka.instance.ip-address=192.168.237.133
